name: Flutter Web CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutter-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.5"
  VERCEL_CLI_VERSION: "54.12.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create public-safe CI env file
        shell: bash
        run: |
          {
            echo "SUPABASE_URL="
            echo "SUPABASE_ANON_KEY="
            echo "OPENWEATHER_API_KEY="
            echo "GEMINI_API_KEY="
            echo "APP_NAME=Plant AI Disease Detection"
            echo "DEBUG_MODE=false"
          } > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run widget tests
        run: flutter test

      - name: Run analyzer
        run: flutter analyze

      - name: Build Flutter web
        run: flutter build web --release --no-wasm-dry-run

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
          if-no-files-found: error

  deploy-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Vercel secrets are not fully configured. Skipping production deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download web build artifact
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel project settings
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output to Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
